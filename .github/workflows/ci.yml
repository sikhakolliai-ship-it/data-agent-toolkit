name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pydantic pydantic-settings pytest ruff

      - name: Lint
        run: ruff check src/data_agent_toolkit/guardrails/ src/data_agent_toolkit/resilience/ src/data_agent_toolkit/state/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest tests/unit/guardrails/ tests/unit/state/ tests/unit/resilience/ -v --tb=short